<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: #1b2838;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 48px;
    font-family: -apple-system, sans-serif;
    color: #fff;
    padding: 40px;
  }
  .row { display: flex; gap: 48px; align-items: center; }
  .label { color: #8899aa; font-size: 0.75rem; margin-top: 8px; text-align: center; }
  .bar {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.04); padding: 12px 20px; border-radius: 10px;
  }
  .bar svg { color: #3b82f6; }
  .title { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.3px; }
  h2 { color: #8899aa; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

  <!-- OPTION A: Filled foot-shaped soles with Y-strap -->
  <div>
    <h2>A — Filled with Y-strap</h2>
    <div class="row">
      <div>
        <svg width="100" height="100" viewBox="0 0 32 32" fill="none">
          <!-- Left sandal -->
          <g transform="rotate(-10, 9, 16)">
            <!-- Foot-shaped sole: wide toe area, arch indent, round heel -->
            <path d="M5.5 7C5 5 6 3 9 3C12 3 13 5 12.5 7L12.8 10C13 11.5 13 13 12.5 14.5L12 16C11.5 17 11.5 18 12 19.5L12.5 22C12.5 24.5 11.5 27 9 27C6.5 27 5.5 24.5 5.5 22L6 19.5C6.5 18 6.5 17 6 16L5.5 14.5C5 13 5 11.5 5.2 10Z" fill="#3b82f6"/>
            <!-- Y-strap -->
            <path d="M9 4V12.5" stroke="#1b2838" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M6 12.5C7 10.5 8 10 9 12.5C10 10 11 10.5 12 12.5" stroke="#1b2838" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          </g>
          <!-- Right sandal (mirrored) -->
          <g transform="translate(14, 0) rotate(10, 7, 16)">
            <path d="M3.5 7C3 5 4 3 7 3C10 3 11 5 10.5 7L10.8 10C11 11.5 11 13 10.5 14.5L10 16C9.5 17 9.5 18 10 19.5L10.5 22C10.5 24.5 9.5 27 7 27C4.5 27 3.5 24.5 3.5 22L4 19.5C4.5 18 4.5 17 4 16L3.5 14.5C3 13 3 11.5 3.2 10Z" fill="#3b82f6"/>
            <path d="M7 4V12.5" stroke="#1b2838" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M4 12.5C5 10.5 6 10 7 12.5C8 10 9 10.5 10 12.5" stroke="#1b2838" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
        <div class="label">100px</div>
      </div>
      <div>
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <g transform="rotate(-10, 9, 16)">
            <path d="M5.5 7C5 5 6 3 9 3C12 3 13 5 12.5 7L12.8 10C13 11.5 13 13 12.5 14.5L12 16C11.5 17 11.5 18 12 19.5L12.5 22C12.5 24.5 11.5 27 9 27C6.5 27 5.5 24.5 5.5 22L6 19.5C6.5 18 6.5 17 6 16L5.5 14.5C5 13 5 11.5 5.2 10Z" fill="#3b82f6"/>
            <path d="M9 4V12.5" stroke="#1b2838" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M6 12.5C7 10.5 8 10 9 12.5C10 10 11 10.5 12 12.5" stroke="#1b2838" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </g>
          <g transform="translate(14, 0) rotate(10, 7, 16)">
            <path d="M3.5 7C3 5 4 3 7 3C10 3 11 5 10.5 7L10.8 10C11 11.5 11 13 10.5 14.5L10 16C9.5 17 9.5 18 10 19.5L10.5 22C10.5 24.5 9.5 27 7 27C4.5 27 3.5 24.5 3.5 22L4 19.5C4.5 18 4.5 17 4 16L3.5 14.5C3 13 3 11.5 3.2 10Z" fill="#3b82f6"/>
            <path d="M7 4V12.5" stroke="#1b2838" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M4 12.5C5 10.5 6 10 7 12.5C8 10 9 10.5 10 12.5" stroke="#1b2838" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
        <div class="label">28px</div>
      </div>
      <div class="bar">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <g transform="rotate(-10, 9, 16)">
            <path d="M5.5 7C5 5 6 3 9 3C12 3 13 5 12.5 7L12.8 10C13 11.5 13 13 12.5 14.5L12 16C11.5 17 11.5 18 12 19.5L12.5 22C12.5 24.5 11.5 27 9 27C6.5 27 5.5 24.5 5.5 22L6 19.5C6.5 18 6.5 17 6 16L5.5 14.5C5 13 5 11.5 5.2 10Z" fill="currentColor"/>
            <path d="M9 4V12.5" stroke="#1b2838" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M6 12.5C7 10.5 8 10 9 12.5C10 10 11 10.5 12 12.5" stroke="#1b2838" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </g>
          <g transform="translate(14, 0) rotate(10, 7, 16)">
            <path d="M3.5 7C3 5 4 3 7 3C10 3 11 5 10.5 7L10.8 10C11 11.5 11 13 10.5 14.5L10 16C9.5 17 9.5 18 10 19.5L10.5 22C10.5 24.5 9.5 27 7 27C4.5 27 3.5 24.5 3.5 22L4 19.5C4.5 18 4.5 17 4 16L3.5 14.5C3 13 3 11.5 3.2 10Z" fill="currentColor"/>
            <path d="M7 4V12.5" stroke="#1b2838" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M4 12.5C5 10.5 6 10 7 12.5C8 10 9 10.5 10 12.5" stroke="#1b2838" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
        <span class="title">Should I Go?</span>
      </div>
    </div>
  </div>

  <!-- OPTION B: Outline with foot-shaped sole -->
  <div>
    <h2>B — Outline with Y-strap</h2>
    <div class="row">
      <div>
        <svg width="100" height="100" viewBox="0 0 32 32" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <!-- Left sandal -->
          <g transform="rotate(-10, 9, 16)">
            <path d="M5.5 7C5 5 6 3 9 3C12 3 13 5 12.5 7L12.8 10C13 11.5 13 13 12.5 14.5L12 16C11.5 17 11.5 18 12 19.5L12.5 22C12.5 24.5 11.5 27 9 27C6.5 27 5.5 24.5 5.5 22L6 19.5C6.5 18 6.5 17 6 16L5.5 14.5C5 13 5 11.5 5.2 10Z"/>
            <path d="M9 4V12.5"/>
            <path d="M6 12.5C7 10.5 8 10 9 12.5C10 10 11 10.5 12 12.5"/>
          </g>
          <!-- Right sandal -->
          <g transform="translate(14, 0) rotate(10, 7, 16)">
            <path d="M3.5 7C3 5 4 3 7 3C10 3 11 5 10.5 7L10.8 10C11 11.5 11 13 10.5 14.5L10 16C9.5 17 9.5 18 10 19.5L10.5 22C10.5 24.5 9.5 27 7 27C4.5 27 3.5 24.5 3.5 22L4 19.5C4.5 18 4.5 17 4 16L3.5 14.5C3 13 3 11.5 3.2 10Z"/>
            <path d="M7 4V12.5"/>
            <path d="M4 12.5C5 10.5 6 10 7 12.5C8 10 9 10.5 10 12.5"/>
          </g>
        </svg>
        <div class="label">100px</div>
      </div>
      <div>
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <g transform="rotate(-10, 9, 16)">
            <path d="M5.5 7C5 5 6 3 9 3C12 3 13 5 12.5 7L12.8 10C13 11.5 13 13 12.5 14.5L12 16C11.5 17 11.5 18 12 19.5L12.5 22C12.5 24.5 11.5 27 9 27C6.5 27 5.5 24.5 5.5 22L6 19.5C6.5 18 6.5 17 6 16L5.5 14.5C5 13 5 11.5 5.2 10Z"/>
            <path d="M9 4V12.5"/>
            <path d="M6 12.5C7 10.5 8 10 9 12.5C10 10 11 10.5 12 12.5"/>
          </g>
          <g transform="translate(14, 0) rotate(10, 7, 16)">
            <path d="M3.5 7C3 5 4 3 7 3C10 3 11 5 10.5 7L10.8 10C11 11.5 11 13 10.5 14.5L10 16C9.5 17 9.5 18 10 19.5L10.5 22C10.5 24.5 9.5 27 7 27C4.5 27 3.5 24.5 3.5 22L4 19.5C4.5 18 4.5 17 4 16L3.5 14.5C3 13 3 11.5 3.2 10Z"/>
            <path d="M7 4V12.5"/>
            <path d="M4 12.5C5 10.5 6 10 7 12.5C8 10 9 10.5 10 12.5"/>
          </g>
        </svg>
        <div class="label">28px</div>
      </div>
      <div class="bar">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <g transform="rotate(-10, 9, 16)">
            <path d="M5.5 7C5 5 6 3 9 3C12 3 13 5 12.5 7L12.8 10C13 11.5 13 13 12.5 14.5L12 16C11.5 17 11.5 18 12 19.5L12.5 22C12.5 24.5 11.5 27 9 27C6.5 27 5.5 24.5 5.5 22L6 19.5C6.5 18 6.5 17 6 16L5.5 14.5C5 13 5 11.5 5.2 10Z"/>
            <path d="M9 4V12.5"/>
            <path d="M6 12.5C7 10.5 8 10 9 12.5C10 10 11 10.5 12 12.5"/>
          </g>
          <g transform="translate(14, 0) rotate(10, 7, 16)">
            <path d="M3.5 7C3 5 4 3 7 3C10 3 11 5 10.5 7L10.8 10C11 11.5 11 13 10.5 14.5L10 16C9.5 17 9.5 18 10 19.5L10.5 22C10.5 24.5 9.5 27 7 27C4.5 27 3.5 24.5 3.5 22L4 19.5C4.5 18 4.5 17 4 16L3.5 14.5C3 13 3 11.5 3.2 10Z"/>
            <path d="M7 4V12.5"/>
            <path d="M4 12.5C5 10.5 6 10 7 12.5C8 10 9 10.5 10 12.5"/>
          </g>
        </svg>
        <span class="title">Should I Go?</span>
      </div>
    </div>
  </div>

  <!-- OPTION C: Filled, simpler, bolder at small size -->
  <div>
    <h2>C — Bold & simple</h2>
    <div class="row">
      <div>
        <svg width="100" height="100" viewBox="0 0 32 32" fill="none">
          <!-- Left flip flop -->
          <g transform="rotate(-12, 10, 16)">
            <path d="M6 6.5C6 4 7.5 2.5 10 2.5C12.5 2.5 14 4 14 6.5L14 10.5C14 12 13.8 13.5 13 15L12.5 16.5C12.2 17.5 12.3 18.5 13 20L13.5 22C14 24 13 27.5 10 27.5C7 27.5 6 24 6.5 22L7 20C7.7 18.5 7.8 17.5 7.5 16.5L7 15C6.2 13.5 6 12 6 10.5Z" fill="#3b82f6"/>
            <!-- Y thong strap -->
            <path d="M10 3.5V12" stroke="rgba(255,255,255,0.4)" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M7 12C8 10 9 9.8 10 12C11 9.8 12 10 13 12" stroke="rgba(255,255,255,0.4)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          </g>
          <!-- Right flip flop (mirrored) -->
          <g transform="translate(12, 0) rotate(12, 6, 16)">
            <path d="M2 6.5C2 4 3.5 2.5 6 2.5C8.5 2.5 10 4 10 6.5L10 10.5C10 12 9.8 13.5 9 15L8.5 16.5C8.2 17.5 8.3 18.5 9 20L9.5 22C10 24 9 27.5 6 27.5C3 27.5 2 24 2.5 22L3 20C3.7 18.5 3.8 17.5 3.5 16.5L3 15C2.2 13.5 2 12 2 10.5Z" fill="#3b82f6"/>
            <path d="M6 3.5V12" stroke="rgba(255,255,255,0.4)" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M3 12C4 10 5 9.8 6 12C7 9.8 8 10 9 12" stroke="rgba(255,255,255,0.4)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
        <div class="label">100px</div>
      </div>
      <div>
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <g transform="rotate(-12, 10, 16)">
            <path d="M6 6.5C6 4 7.5 2.5 10 2.5C12.5 2.5 14 4 14 6.5L14 10.5C14 12 13.8 13.5 13 15L12.5 16.5C12.2 17.5 12.3 18.5 13 20L13.5 22C14 24 13 27.5 10 27.5C7 27.5 6 24 6.5 22L7 20C7.7 18.5 7.8 17.5 7.5 16.5L7 15C6.2 13.5 6 12 6 10.5Z" fill="#3b82f6"/>
          </g>
          <g transform="translate(12, 0) rotate(12, 6, 16)">
            <path d="M2 6.5C2 4 3.5 2.5 6 2.5C8.5 2.5 10 4 10 6.5L10 10.5C10 12 9.8 13.5 9 15L8.5 16.5C8.2 17.5 8.3 18.5 9 20L9.5 22C10 24 9 27.5 6 27.5C3 27.5 2 24 2.5 22L3 20C3.7 18.5 3.8 17.5 3.5 16.5L3 15C2.2 13.5 2 12 2 10.5Z" fill="#3b82f6"/>
          </g>
        </svg>
        <div class="label">28px</div>
      </div>
      <div class="bar">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <g transform="rotate(-12, 10, 16)">
            <path d="M6 6.5C6 4 7.5 2.5 10 2.5C12.5 2.5 14 4 14 6.5L14 10.5C14 12 13.8 13.5 13 15L12.5 16.5C12.2 17.5 12.3 18.5 13 20L13.5 22C14 24 13 27.5 10 27.5C7 27.5 6 24 6.5 22L7 20C7.7 18.5 7.8 17.5 7.5 16.5L7 15C6.2 13.5 6 12 6 10.5Z" fill="currentColor"/>
          </g>
          <g transform="translate(12, 0) rotate(12, 6, 16)">
            <path d="M2 6.5C2 4 3.5 2.5 6 2.5C8.5 2.5 10 4 10 6.5L10 10.5C10 12 9.8 13.5 9 15L8.5 16.5C8.2 17.5 8.3 18.5 9 20L9.5 22C10 24 9 27.5 6 27.5C3 27.5 2 24 2.5 22L3 20C3.7 18.5 3.8 17.5 3.5 16.5L3 15C2.2 13.5 2 12 2 10.5Z" fill="currentColor"/>
          </g>
        </svg>
        <span class="title">Should I Go?</span>
      </div>
    </div>
  </div>

</body>
</html>
