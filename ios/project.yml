name: ShouldIGo

options:
  bundleIdPrefix: surf.shouldigo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  ShouldIGo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShouldIGo
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: surf.shouldigo.app
        INFOPLIST_FILE: ShouldIGo/Info.plist
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    entitlements:
      path: ShouldIGo/ShouldIGo.entitlements
      properties:
        aps-environment: development
    info:
      path: ShouldIGo/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: "Your location helps us find the closest surf spots to you."
